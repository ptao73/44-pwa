<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>44-pwa — 1944 iPhone 3D</title>
  <meta name="description" content="iPhone-optimized 3D shooter — pure WebGL, no modules, offline playable.">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a237e">
  <style>
    * { margin: 0; padding: 0; }
    body {
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
      color: #0ff;
      text-shadow: 0 0 5px #0ff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      image-rendering: pixelated;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      font-size: 14px;
      line-height: 1.4;
      text-shadow: 0 0 3px #000;
    }
    #controls {
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 10;
      font-size: 12px;
      color: #aaa;
      text-shadow: 0 0 2px #000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    SCORE: <span id="score">0</span><br>
    LIVES: <span id="lives">3</span><br>
    LOOP: <span id="loopMeter">0%</span>
  </div>
  <div id="controls">
    📱 Touch: Drag to fly | Long press for Loop<br>
    💻 PC: ← → | SPACE | P
  </div>

  <!-- Three.js UMD (iOS Safari 100% compatible) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // === SCENE SETUP ===
    const canvas = document.getElementById('gameCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000022);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 50);

    // === LIGHTS ===
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    // === SKYBOX (procedural) ===
    const skyGeometry = new THREE.SphereGeometry(500, 32, 32);
    const skyMaterial = new THREE.MeshBasicMaterial({
      color: 0x000033,
      side: THREE.BackSide
    });
    const sky = new THREE.Mesh(skyGeometry, skyMaterial);
    scene.add(sky);

    // === PLAYER (P-38) ===
    const playerGroup = new THREE.Group();
    scene.add(playerGroup);

    // Simplified P-38 using BufferGeometry
    const p38Geometry = new THREE.BufferGeometry();
    const vertices = new Float32Array([
      // Fuselage
      -5, -10, 0, 5, -10, 0, 5, 10, 0,
      -5, -10, 0, 5, 10, 0, -5, 10, 0,
      // Wings
      -20, -2, 0, 20, -2, 0, 20, 2, 0,
      -20, -2, 0, 20, 2, 0, -20, 2, 0,
      // Engines
      -10, -8, 0, -5, -8, 0, -5, 8, 0,
      -10, -8, 0, -5, 8, 0, -10, 8, 0,
      5, -8, 0, 10, -8, 0, 10, 8, 0,
      5, -8, 0, 10, 8, 0, 5, 8, 0,
    ]);
    const indices = [
      0,1,2, 0,2,3, // fuselage
      4,5,6, 4,6,7, // wings
      8,9,10, 8,10,11, // left engine
      12,13,14, 12,14,15, // right engine
    ];
    p38Geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    p38Geometry.setIndex(indices);
    p38Geometry.computeVertexNormals();

    const p38Material = new THREE.MeshPhongMaterial({ 
      color: 0x3399ff, 
      shininess: 80,
      specular: 0x333333
    });
    const p38 = new THREE.Mesh(p38Geometry, p38Material);
    playerGroup.add(p38);

    // === ALLIES (Loop orbit) ===
    const allies = [];
    for (let i = 0; i < 2; i++) {
      const geo = new THREE.SphereGeometry(1.5, 16, 16);
      const mat = new THREE.MeshPhongMaterial({ color: 0x00ccff });
      const ally = new THREE.Mesh(geo, mat);
      ally.position.y = 2;
      playerGroup.add(ally);
      allies.push({ mesh: ally, angle: i * Math.PI, speed: 0.02 });
    }

    // === GAME STATE ===
    const state = {
      score: 0,
      lives: 3,
      loopCharge: 0,
      isPaused: false,
      keys: {},
      touchStartX: 0,
      touchStartY: 0,
      isDragging: false,
      loopActive: false,
      loopTimer: 0
    };

    // === INPUT HANDLING ===
    window.addEventListener('keydown', e => {
      state.keys[e.key] = true;
      if (e.key === 'p' || e.key === 'P') state.isPaused = !state.isPaused;
      if (e.key === ' ' && !state.loopActive) {
        state.loopCharge = Math.min(100, state.loopCharge + 20);
      }
    });

    window.addEventListener('keyup', e => {
      state.keys[e.key] = false;
    });

    // Touch for iPhone
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      state.touchStartX = e.touches[0].clientX;
      state.touchStartY = e.touches[0].clientY;
      state.isDragging = true;
    });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!state.isDragging) return;
      const dx = e.touches[0].clientX - state.touchStartX;
      const dy = e.touches[0].clientY - state.touchStartY;
      playerGroup.rotation.y += dx * 0.01;
      playerGroup.rotation.x += dy * 0.01;
      playerGroup.rotation.x = Math.max(-Math.PI/4, Math.min(Math.PI/4, playerGroup.rotation.x));
      state.touchStartX = e.touches[0].clientX;
      state.touchStartY = e.touches[0].clientY;
    });

    canvas.addEventListener('touchend', () => {
      state.isDragging = false;
    });

    // Long press for Loop
    let longPressTimer;
    canvas.addEventListener('touchstart', () => {
      longPressTimer = setTimeout(() => {
        if (state.loopCharge >= 100) {
          state.loopActive = true;
          state.loopTimer = 180;
          state.loopCharge = 0;
        }
      }, 500);
    });

    canvas.addEventListener('touchend', () => {
      clearTimeout(longPressTimer);
    });

    // === ANIMATION LOOP ===
    function animate() {
      requestAnimationFrame(animate);

      if (state.isPaused) return;

      // Player movement
      if (state.keys['ArrowLeft']) playerGroup.rotation.y -= 0.02;
      if (state.keys['ArrowRight']) playerGroup.rotation.y += 0.02;

      // Loop charge
      if (state.keys[' '] && !state.loopActive) {
        state.loopCharge = Math.min(100, state.loopCharge + 2);
      }

      // Update allies
      allies.forEach(a => {
        a.angle += a.speed;
        a.mesh.position.x = Math.cos(a.angle) * 8;
        a.mesh.position.z = Math.sin(a.angle) * 8;
      });

      // Loop effect
      if (state.loopActive) {
        state.loopTimer--;
        if (state.loopTimer <= 0) state.loopActive = false;
      }

      // UI update
      document.getElementById('score').textContent = state.score;
      document.getElementById('lives').textContent = state.lives;
      document.getElementById('loopMeter').textContent = `${Math.round(state.loopCharge)}%`;

      // Render
      renderer.render(scene, camera);
    }

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start
    animate();
  </script>
</body>
</html>
